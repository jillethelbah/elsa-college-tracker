<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elsa's College & Swim Tracker 🏊‍♀️🎓</title>
  <style>
    :root {
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --purple-dark: #5b21b6;
      --pink: #ec4899;
      --pink-light: #fce7f3;
      --teal: #14b8a6;
      --teal-light: #ccfbf1;
      --orange: #f97316;
      --orange-light: #fff7ed;
      --blue: #3b82f6;
      --blue-light: #dbeafe;
      --green: #22c55e;
      --green-light: #dcfce7;
      --bg: #faf5ff;
      --surface: #ffffff;
      --text: #1e1b4b;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --radius: 16px;
      --shadow: 0 4px 12px rgba(124,58,237,0.08);
      --shadow-hover: 0 8px 24px rgba(124,58,237,0.15);
      --font: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 50%, var(--orange) 100%);
      color: #fff;
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: "🎓 🏫 📚 ✨ 🌟 🎯 💜";
      position: absolute;
      top: 8px; left: 0; right: 0;
      font-size: 24px;
      letter-spacing: 16px;
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .header h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; position: relative; }
    .header p { font-size: 14px; opacity: 0.9; position: relative; }

    /* Stats bar */
    .stats-bar {
      display: flex; justify-content: center; gap: 24px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat__number { font-size: 24px; font-weight: 800; }
    .stat__label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat--total .stat__number { color: var(--purple); }
    .stat--love .stat__number { color: var(--pink); }
    .stat--like .stat__number { color: var(--teal); }
    .stat--maybe .stat__number { color: var(--orange); }

    /* Container */
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      background: var(--surface); border-radius: 12px;
      padding: 4px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px 8px;
      border: none; background: none;
      border-radius: 10px; cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text-secondary); transition: all 0.2s;
    }
    .tab.active { background: var(--purple); color: #fff; }
    .tab:hover:not(.active) { background: var(--purple-light); }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Add College Form */
    .add-form {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
      border: 2px dashed var(--purple-light);
    }
    .add-form h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 10px; font-family: var(--font); font-size: 14px;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--purple);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .btn-add {
      margin-top: 12px; width: 100%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      font-family: var(--font);
    }
    .btn-add:hover { transform: scale(1.02); box-shadow: var(--shadow-hover); }

    /* College Cards */
    .college-list { display: flex; flex-direction: column; gap: 16px; }
    .college-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: all 0.2s;
      border-left: 5px solid var(--purple);
    }
    .college-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .college-card[data-interest="love"] { border-left-color: var(--pink); }
    .college-card[data-interest="like"] { border-left-color: var(--teal); }
    .college-card[data-interest="maybe"] { border-left-color: var(--orange); }
    .college-card[data-interest="applied"] { border-left-color: var(--blue); }
    .college-card[data-interest="accepted"] { border-left-color: var(--green); }

    .card-header {
      padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      cursor: pointer;
    }
    .card-header h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .card-header .location { font-size: 13px; color: var(--text-secondary); }
    .card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .interest-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .interest-badge[data-interest="love"] { background: var(--pink-light); color: var(--pink); }
    .interest-badge[data-interest="like"] { background: var(--teal-light); color: var(--teal); }
    .interest-badge[data-interest="maybe"] { background: var(--orange-light); color: var(--orange); }
    .interest-badge[data-interest="applied"] { background: var(--blue-light); color: var(--blue); }
    .interest-badge[data-interest="accepted"] { background: var(--green-light); color: var(--green); }

    .btn-icon {
      background: none; border: none; cursor: pointer;
      font-size: 18px; padding: 4px; border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-icon:hover { background: var(--purple-light); }

    .card-details {
      padding: 0 20px 16px;
      display: none;
      border-top: 1px solid var(--border);
    }
    .card-details.open { display: block; padding-top: 16px; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 12px;
    }
    @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-item label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-item p { font-size: 14px; font-weight: 500; }

    .notes-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .note { background: #fffbeb; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 13px; position: relative; }
    .note .note-date { font-size: 10px; color: var(--text-secondary); }
    .note .note-delete { position: absolute; top: 6px; right: 8px; background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.5; }
    .note .note-delete:hover { opacity: 1; }
    .add-note-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-note-row input {
      flex: 1; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-family: var(--font); font-size: 13px;
    }
    .add-note-row button {
      padding: 8px 16px; background: var(--purple); color: #fff;
      border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
      font-family: var(--font); font-size: 13px;
    }

    /* Photos */
    .photos-section { margin-top: 12px; }
    .photos-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .photos-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px; margin-bottom: 8px;
    }
    .photo-thumb {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      position: relative; cursor: pointer;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .photo-delete {
      position: absolute; top: 2px; right: 2px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; border-radius: 50%;
      width: 20px; height: 20px; font-size: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; background: var(--purple-light); color: var(--purple);
      border: 2px dashed var(--purple); border-radius: 10px;
      font-weight: 600; cursor: pointer; font-size: 13px;
      font-family: var(--font); transition: all 0.15s;
    }
    .upload-btn:hover { background: var(--purple); color: #fff; }
    .upload-btn input { display: none; }

    /* Journal Panel */
    .journal-entry {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 12px;
    }
    .journal-entry .je-date { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
    .journal-entry .je-school { font-size: 14px; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
    .journal-entry .je-text { font-size: 14px; line-height: 1.6; }
    .journal-entry .je-photos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .journal-entry .je-photos img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 48px 20px;
      color: var(--text-secondary);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    /* Filter/Sort bar */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-chip {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      transition: all 0.15s; color: var(--text-secondary);
    }
    .filter-chip.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .filter-chip:hover:not(.active) { border-color: var(--purple); color: var(--purple); }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      background: #fff; border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>Elsa's College & Swim Tracker 🏊‍♀️🎓</h1>
    <p>Find the perfect school & team — your future is bright! ✨</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat stat--total"><div class="stat__number" id="statTotal">0</div><div class="stat__label">Schools</div></div>
    <div class="stat stat--love"><div class="stat__number" id="statLove">0</div><div class="stat__label">💜 Love</div></div>
    <div class="stat stat--like"><div class="stat__number" id="statLike">0</div><div class="stat__label">💚 Like</div></div>
    <div class="stat stat--maybe"><div class="stat__number" id="statMaybe">0</div><div class="stat__label">🧡 Maybe</div></div>
  </div>

  <div class="container">

    <div class="tabs">
      <button class="tab active" data-tab="schools" onclick="switchTab('schools')">🏫 Schools</button>
      <button class="tab" data-tab="add" onclick="switchTab('add')">➕ Add New</button>
      <button class="tab" data-tab="journal" onclick="switchTab('journal')">📓 Journal</button>
    </div>

    <!-- SCHOOLS PANEL -->
    <div class="panel active" id="panel-schools">
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" data-filter="all" onclick="filterSchools('all')">All</button>
        <button class="filter-chip" data-filter="love" onclick="filterSchools('love')">💜 Love</button>
        <button class="filter-chip" data-filter="like" onclick="filterSchools('like')">💚 Like</button>
        <button class="filter-chip" data-filter="maybe" onclick="filterSchools('maybe')">🧡 Maybe</button>
        <button class="filter-chip" data-filter="applied" onclick="filterSchools('applied')">💙 Applied</button>
        <button class="filter-chip" data-filter="accepted" onclick="filterSchools('accepted')">💚 Accepted</button>
      </div>
      <div class="college-list" id="collegeList"></div>
    </div>

    <!-- ADD NEW PANEL -->
    <div class="panel" id="panel-add">
      <div class="add-form">
        <h2>➕ Add a School</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>School Name *</label>
            <input type="text" id="schoolName" placeholder="e.g. Stanford University" />
          </div>
          <div class="form-group">
            <label>City & State</label>
            <input type="text" id="schoolLocation" placeholder="e.g. Palo Alto, CA" />
          </div>
          <div class="form-group">
            <label>Interest Level</label>
            <select id="schoolInterest">
              <option value="love">💜 Love It!</option>
              <option value="like">💚 Like It</option>
              <option value="maybe">🧡 Maybe</option>
            </select>
          </div>
          <div class="form-group">
            <label>Application Deadline</label>
            <input type="date" id="schoolDeadline" />
          </div>
          <div class="form-group">
            <label>Major / Program</label>
            <input type="text" id="schoolMajor" placeholder="e.g. Computer Science" />
          </div>
          <div class="form-group">
            <label>Campus Size</label>
            <select id="schoolSize">
              <option value="">— Select —</option>
              <option value="Small">Small (&lt;5,000)</option>
              <option value="Medium">Medium (5,000–15,000)</option>
              <option value="Large">Large (15,000+)</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Why I'm Interested</label>
            <textarea id="schoolWhy" placeholder="What excites you about this school?"></textarea>
          </div>
          <div class="form-group">
            <label>Tuition/yr</label>
            <input type="text" id="schoolTuition" placeholder="e.g. $20K" />
          </div>
          <div class="form-group">
            <label>Room & Board/yr</label>
            <input type="text" id="schoolRoom" placeholder="e.g. $15K" />
          </div>
          <div class="form-group">
            <label>NCAA Division</label>
            <input type="text" id="schoolDivision" placeholder="e.g. DI, DIII" />
          </div>
          <div class="form-group">
            <label>Acceptance Rate</label>
            <input type="text" id="schoolAcceptance" placeholder="e.g. 40%" />
          </div>
          <div class="form-group">
            <label>🏊‍♀️ Swim Team Strength</label>
            <input type="text" id="schoolSwim" placeholder="e.g. Strong DI program" />
          </div>
          <div class="form-group">
            <label>Women's Swim Coach</label>
            <input type="text" id="schoolCoach" placeholder="Coach email" />
          </div>
          <div class="form-group">
            <label>School Website</label>
            <input type="url" id="schoolUrl" placeholder="https://www.school.edu" />
          </div>
          <div class="form-group">
            <label>Date Visited</label>
            <input type="text" id="schoolVisited" placeholder="e.g. 22-Jul" />
          </div>
          <div class="form-group full">
            <label>📸 Upload Campus Photos</label>
            <label class="upload-btn">
              <span>📷 Choose Photos</span>
              <input type="file" id="schoolPhotos" accept="image/*" multiple capture="environment" />
            </label>
            <div id="photoPreview" style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;"></div>
          </div>
        </div>
        <button class="btn-add" onclick="addSchool()">🎓 Add This School!</button>
      </div>
    </div>

    <!-- JOURNAL PANEL -->
    <div class="panel" id="panel-journal">
      <div id="journalList"></div>
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" src="" alt="Full size photo" />
  </div>

  <script>
    let schools = JSON.parse(localStorage.getItem('elsaColleges') || '[]');
    let currentFilter = 'all';
    let pendingPhotos = [];

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
      if (tab === 'journal') renderJournal();
    }

    // Filter
    function filterSchools(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
      renderSchools();
    }

    // Photo upload preview for add form
    document.getElementById('schoolPhotos').addEventListener('change', function(e) {
      const preview = document.getElementById('photoPreview');
      pendingPhotos = [];
      preview.innerHTML = '';
      Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(ev) {
          pendingPhotos.push(ev.target.result);
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.style.cssText = 'width:60px;height:60px;object-fit:cover;border-radius:8px;';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    // Add school
    function addSchool() {
      const name = document.getElementById('schoolName').value.trim();
      if (!name) { alert('Please enter a school name!'); return; }

      const school = {
        id: Date.now().toString(),
        name,
        location: document.getElementById('schoolLocation').value.trim(),
        interest: document.getElementById('schoolInterest').value,
        deadline: document.getElementById('schoolDeadline').value,
        major: document.getElementById('schoolMajor').value.trim(),
        size: document.getElementById('schoolSize').value,
        why: document.getElementById('schoolWhy').value.trim(),
        tuition: document.getElementById('schoolTuition').value.trim(),
        room: document.getElementById('schoolRoom').value.trim(),
        division: document.getElementById('schoolDivision').value.trim(),
        acceptance: document.getElementById('schoolAcceptance').value.trim(),
        swim: document.getElementById('schoolSwim').value.trim(),
        coach: document.getElementById('schoolCoach').value.trim(),
        url: document.getElementById('schoolUrl').value.trim(),
        visited: document.getElementById('schoolVisited').value.trim(),
        photos: pendingPhotos.slice(),
        notes: [],
        addedDate: new Date().toISOString()
      };

      schools.push(school);
      save();
      renderSchools();
      updateStats();

      // Reset form
      ['schoolName','schoolLocation','schoolDeadline','schoolMajor','schoolWhy','schoolTuition','schoolRoom','schoolDivision','schoolAcceptance','schoolSwim','schoolCoach','schoolUrl','schoolVisited'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('schoolInterest').value = 'love';
      document.getElementById('schoolSize').value = '';
      document.getElementById('schoolPhotos').value = '';
      document.getElementById('photoPreview').innerHTML = '';
      pendingPhotos = [];

      switchTab('schools');
    }

    // Delete school
    function deleteSchool(id) {
      if (!confirm('Remove this school from your list?')) return;
      schools = schools.filter(s => s.id !== id);
      save(); renderSchools(); updateStats();
    }

    // Toggle card details
    function toggleCard(id) {
      const el = document.querySelector(`#details-${id}`);
      el.classList.toggle('open');
    }

    // Change interest
    function changeInterest(id, value) {
      const school = schools.find(s => s.id === id);
      if (school) { school.interest = value; save(); renderSchools(); updateStats(); }
    }

    // Add note
    function addNote(id) {
      const input = document.querySelector(`#note-input-${id}`);
      const text = input.value.trim();
      if (!text) return;
      const school = schools.find(s => s.id === id);
      school.notes.push({ text, date: new Date().toISOString() });
      input.value = '';
      save(); renderSchools();
    }

    // Delete note
    function deleteNote(schoolId, noteIndex) {
      const school = schools.find(s => s.id === schoolId);
      school.notes.splice(noteIndex, 1);
      save(); renderSchools();
    }

    // Add photo to existing school
    function addPhotoToSchool(id) {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.multiple = true; input.capture = 'environment';
      input.onchange = function(e) {
        const school = schools.find(s => s.id === id);
        Array.from(e.target.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = function(ev) {
            school.photos.push(ev.target.result);
            save(); renderSchools();
          };
          reader.readAsDataURL(file);
        });
      };
      input.click();
    }

    // Delete photo
    function deletePhoto(schoolId, photoIndex) {
      const school = schools.find(s => s.id === schoolId);
      school.photos.splice(photoIndex, 1);
      save(); renderSchools();
    }

    // Lightbox
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    // Render
    function renderSchools() {
      const list = document.getElementById('collegeList');
      let filtered = currentFilter === 'all' ? schools : schools.filter(s => s.interest === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="emoji">${schools.length === 0 ? '🎓' : '🔍'}</div>
          <h3>${schools.length === 0 ? 'No schools yet!' : 'No matches'}</h3>
          <p>${schools.length === 0 ? 'Tap "Add New" to start building your dream list' : 'Try a different filter'}</p>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(s => {
        const deadlineStr = s.deadline ? new Date(s.deadline + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        const notesHtml = s.notes.map((n, i) => `
          <div class="note">
            <div class="note-date">${new Date(n.date).toLocaleDateString()}</div>

        const photosHtml = s.photos.map((p, i) => `

            <img src="${p}" alt="Campus photo" loading="lazy" />
            <button class="photo-delete" onclick="event.stopPropagation();deletePhoto('${s.id}',${i})">&times;</button>

        return `
        <div class="college-card" data-interest="${s.interest}">
          <div class="card-header" onclick="toggleCard('${s.id}')">
            <div>
              <h3>${s.name}</h3>
              <div class="location">📍 ${s.location || 'Location TBD'}${s.division ? ' · ' + s.division : ''}</div>
            </div>
            <div class="card-actions">
              <span class="interest-badge" data-interest="${s.interest}">${
                {love:'💜 Love',like:'💚 Like',maybe:'🧡 Maybe',applied:'💙 Applied',accepted:'💚 Accepted'}[s.interest]
              }</span>
              <button class="btn-icon" onclick="event.stopPropagation();deleteSchool('${s.id}')" title="Remove">🗑️</button>
            </div>
          </div>
          <div class="card-details" id="details-${s.id}">
            <div class="detail-grid">
              <div class="detail-item"><label>💰 Tuition/yr</label><p>${s.tuition || '—'}</p></div>
              <div class="detail-item"><label>🏠 Room & Board</label><p>${s.room || '—'}</p></div>
              <div class="detail-item"><label>📊 Acceptance Rate</label><p>${s.acceptance || '—'}</p></div>
              <div class="detail-item"><label>🏫 Undergrads</label><p>${s.size || '—'}</p></div>
              <div class="detail-item"><label>🏊‍♀️ Swim Program</label><p>${s.swim || '—'}</p></div>
              <div class="detail-item"><label>📅 Deadline</label><p>${deadlineStr}</p></div>
              ${s.coach ? `<div class="detail-item"><label>👩‍🏫 Swim Coach</label><p><a href="mailto:${s.coach}">${s.coach}</a></p></div>` : ''}
              ${s.url ? `<div class="detail-item"><label>🌐 Website</label><p><a href="${s.url}" target="_blank">${s.url.replace('https://','')}</a></p></div>` : ''}
              ${s.visited ? `<div class="detail-item"><label>👀 Visited</label><p>${s.visited}</p></div>` : ''}
              ${s.major ? `<div class="detail-item"><label>📖 Major</label><p>${s.major}</p></div>` : ''}
              <div class="detail-item">
                <label>Status</label>
                <select onchange="changeInterest('${s.id}',this.value)" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;">
                  <option value="love" ${s.interest==='love'?'selected':''}>💜 Love</option>
                  <option value="like" ${s.interest==='like'?'selected':''}>💚 Like</option>
                  <option value="maybe" ${s.interest==='maybe'?'selected':''}>🧡 Maybe</option>
                  <option value="applied" ${s.interest==='applied'?'selected':''}>💙 Applied</option>
                  <option value="accepted" ${s.interest==='accepted'?'selected':''}>💚 Accepted</option>
                </select>
              </div>
            </div>
            ${s.why ? `<div class="notes-section"><h4>Why I'm Interested</h4><div class="note">${s.why}</div></div>` : ''}
            <div class="notes-section">
              <h4>📝 Notes (${s.notes.length})</h4>
              ${notesHtml}
              <div class="add-note-row">
                <input type="text" id="note-input-${s.id}" placeholder="Add a note..." onkeydown="if(event.key==='Enter')addNote('${s.id}')" />
                <button onclick="addNote('${s.id}')">Add</button>
              </div>
            </div>
            <div class="photos-section">
              <h4>📸 Photos (${s.photos.length})</h4>
              <div class="photos-grid">${photosHtml}</div>
              <button class="upload-btn" onclick="event.stopPropagation();addPhotoToSchool('${s.id}')">📷 Add Photos</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // Journal
    function renderJournal() {
      const list = document.getElementById('journalList');
      const entries = [];
      schools.forEach(s => {
        s.notes.forEach(n => entries.push({ school: s.name, text: n.text, date: n.date, interest: s.interest }));
        if (s.photos.length > 0) entries.push({ school: s.name, text: `Added ${s.photos.length} photo(s)`, date: s.addedDate, interest: s.interest, photos: s.photos.slice(0,4) });
      });
      entries.sort((a,b) => new Date(b.date) - new Date(a.date));

      if (entries.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="emoji">📓</div><h3>No journal entries yet</h3><p>Add notes and photos to schools to see them here!</p></div>`;
        return;
      }

      list.innerHTML = entries.map(e => `
        <div class="journal-entry">
          <div class="je-date">${new Date(e.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
          <div class="je-school">${e.school}</div>
          <div class="je-text">${e.text}</div>
          ${e.photos ? `<div class="je-photos">${e.photos.map(p => `<img src="${p}" alt="Photo" onclick="openLightbox('${p.replace(/'/g,"\\'")}')" />`).join('')}</div>` : ''}
        </div>`).join('');
    }

    // Stats

      document.getElementById('statTotal').textContent = schools.length;
      document.getElementById('statLove').textContent = schools.filter(s => s.interest === 'love').length;
      document.getElementById('statLike').textContent = schools.filter(s => s.interest === 'like').length;
      document.getElementById('statMaybe').textContent = schools.filter(s => s.interest === 'maybe').length;
    }
